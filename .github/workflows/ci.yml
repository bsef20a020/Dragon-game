name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Godot headless tests
    runs-on: ubuntu-latest
    env:
      GODOT_VERSION: 4.3-stable
    steps:
      - uses: actions/checkout@v4

      - name: Download Godot ${{ env.GODOT_VERSION }} (headless)
        run: |
          set -e
          url="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          curl -fsSL -o godot.zip "$url"
          unzip -q godot.zip
          mv "Godot_v${GODOT_VERSION}_linux.x86_64" godot-bin
          chmod +x godot-bin
          ./godot-bin --version

      - name: Import project
        working-directory: godot
        run: ../godot-bin --headless --path . --import

      - name: Run test suite
        working-directory: godot
        run: GODOT="${GITHUB_WORKSPACE}/godot-bin" ./run-tests.sh
